<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accessible Semantic Page</title>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>My Personal Blog</h1>
  </header>

  <!-- Navigation مع aria-label -->
  <nav aria-label="Main navigation">
    <a href="#home">Home</a><br>
    <a href="#blog">Blog</a><br>
    <a href="#contact">Contact</a>
  </nav>

  <!-- Main Content -->
  <main>
    <section id="blog">
      <article>
        <h2>First Blog Post</h2>
        <p>This is the content of my first blog post.</p>
      </article>

      <article>
        <h2>Second Blog Post</h2>
        <p>This is the content of my second blog post.</p>
      </article>
    </section>
  </main>

  <!-- Sidebar -->
  <aside>
    <h3>About Me</h3>
    <p>Hi! I love coding and learning web development.</p>
    <img src="profile.jpg" alt="Profile picture of the blog author">
  </aside>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Personal Blog</p>
  </footer>

</body>
</html>
