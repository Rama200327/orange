<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Block vs Inline Example</title>
</head>
<body>

  <h2>Block vs Inline Elements</h2>

  <!-- Block Elements -->
  <div style="background-color: lightblue; padding: 10px; margin-bottom: 10px;">
    This is the first block element
  </div>

  <div style="background-color: lightgreen; padding: 10px; margin-bottom: 10px;">
    This is the second block element
  </div>

  <!-- Inline Elements inside paragraph -->
  <p>
    This is a paragraph with <span style="color: red; font-weight: bold;">one red word</span> inline.
  </p>

  <p>
    Another paragraph with <span style="color: blue;">blue inline words</span> inside the text.
  </p>

</body>
</html>
