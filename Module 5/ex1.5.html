<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Block vs Inline Elements</title>
</head>
<body>

  <h2>Block vs Inline Elements</h2>

  <!-- Block Elements -->
  <div>This is a block element</div>
  <div>Another block element</div>

  <!-- Inline Elements inside paragraph -->
  <p>
    This is a paragraph with <span style="color:red;">one red word</span> inline.
  </p>

  <p>
    Another paragraph with <span style="color:blue;">blue inline words</span> inside the text.
  </p>

</body>
</html>
