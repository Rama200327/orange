<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Attributes</title>
</head>
<body>

  <h2>Email Submission Form</h2>

  <form action="https://example.com/submit" method="POST" target="_blank" autocomplete="off">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>
    <br><br>

    <input type="submit" value="Send">

  </form>

</body>
</html>
