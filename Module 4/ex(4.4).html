<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Module 4 – Survey Form</title>
</head>
<body>

  <h2>Survey Form</h2>

  <form action="#" method="post">

    <!-- Username -->
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" placeholder="Max 10 characters" maxlength="10" required>
    <br><br>

    <!-- Age -->
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="18" max="60">
    <br><br>

    <!-- Favorite Programming Language -->
    <label for="language">Favorite Programming Language:</label>
    <input type="text" id="language" name="language" list="langs">
    <datalist id="langs">
      <option value="HTML">
      <option value="CSS">
      <option value="JavaScript">
      <option value="Python">
    </datalist>
    <br><br>

    <!-- Submit Button -->
    <button type="submit">Submit</button>

  </form>

</body>
</html>
