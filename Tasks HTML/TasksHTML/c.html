<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tables</title>
<style>

table {
  border: 6px double #555;     
  border-collapse: separate;     
  border-spacing: 0;             
  margin-bottom: 25px;
}

td, th {
  border: 3px double #555;      
  padding: 10px;
  text-align: left;
}

</style>
</head>
<body>

<!-- First Table -->
<table>
<tr>
  <th colspan="2">Language and Frameworks</th> 
</tr>

<tr>
<td>Python</td>
<td>Django</td>
</tr>

<tr>
<td rowspan="2">JavaScript</td>
<td>React.js</td>
</tr>

<tr>
<td>Vue.js</td>
</tr>

<tr>
<td>Ruby</td>
<td>Ruby on Rails</td>
</tr>
</table>

<!-- Second Table -->
<table>
<h>
  <th colspan="4">Table Num. 2</th>
</h>

<tr>
<td rowspan="2">Row 1-2, Col 1</td>
<td>Row 1, Col 2</td>
<td>Row 1, Col 3</td>
<td>Row 1, Col 4</td>
</tr>

<tr>
<td colspan="2" rowspan="2">Row 2-3, Col 2-3</td>
<td>Row 2, Col 4</td>
</tr>

<tr>
<td>Row 3, Col 1</td>
<td>Row 3, Col 4</td>
</tr>

<tr>
<td>Row 4, Col 1</td>
<td>Row 4, Col 2</td>
<td colspan="2">Row 4, Col 3-4</td>
</tr>

</table>

</body>
</html>
