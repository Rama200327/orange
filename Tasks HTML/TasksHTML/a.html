<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Images in Tables</title>

<style>
table, th, td {
  border: 1px solid grey;
  border-collapse: collapse;
  padding: 10px;
  text-align: center;
}

img {
  width: 250px;
  height: 160px;
}
</style>

</head>
<body>

<h2>Images in Tables</h2>
<hr>

<p><b>What are your favorite pets?</b></p>

<table>
<tr>
  <th>Pet Image</th>
  <th>More facts (link)</th>
</tr>

<tr>
  <td>
    <img src="https://images.unsplash.com/photo-1553284965-83fd3e82fa5a" alt="Horse">
  </td>
  <td>
    <a href="#">Horse</a>
  </td>
</tr>

<tr>
  <td>
    <img src="https://images.unsplash.com/photo-1558788353-f76d92427f16" alt="Dog">
  </td>
  <td>
    <a href="#">Dog</a>
  </td>
</tr>

<tr>
  <td>
    <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131" alt="Cat">
  </td>
  <td>
    <a href="#">Cat</a>
  </td>
</tr>

</table>

</body>
</html>
